<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Cup Sweepstake 2026</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>🏆 World Cup Sweepstake 2026</h1>
    <p class="subtitle">Live leaderboard powered by Google Sheets</p>
    <p id="lastUpdated">Loading data...</p>
  </header>

  <main>
    <section class="grid">
      <div class="card">
        <h2>🏅 Leaderboard</h2>
        <div id="leaderboard"></div>
      </div>

      <div class="card">
        <h2>⚽ Teams</h2>
        <div id="teams"></div>
      </div>

      <div class="card">
        <h2>📊 Scoring Rules</h2>
        <div id="scoring"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>Auto-updating from Google Sheets</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
